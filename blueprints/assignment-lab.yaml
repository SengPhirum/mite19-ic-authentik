# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: authentik-assignment-lab
  labels:
    blueprints.goauthentik.io/description: Demo users, groups, Grafana OIDC provider, and group-based access policy for the assignment lab.
    blueprints.goauthentik.io/instantiate: "true"

entries:
  - model: authentik_core.user
    id: demo-admin-user
    state: created
    identifiers:
      username: demo-admin
    attrs:
      name: Demo Administrator
      email: demo-admin@example.local
      is_active: true
      type: internal
      path: users
      password: !Env DEMO_ADMIN_PASSWORD

  - model: authentik_core.user
    id: demo-regular-user
    state: created
    identifiers:
      username: demo-user
    attrs:
      name: Demo Regular User
      email: demo-user@example.local
      is_active: true
      type: internal
      path: users
      password: !Env DEMO_USER_PASSWORD

  - model: authentik_core.user
    id: demo-outsider-user
    state: created
    identifiers:
      username: demo-outsider
    attrs:
      name: Demo Unauthorized User
      email: demo-outsider@example.local
      is_active: true
      type: internal
      path: users
      password: !Env DEMO_OUTSIDER_PASSWORD

  - model: authentik_core.group
    id: assignment-admins-group
    state: present
    identifiers:
      name: assignment-admins
    attrs:
      is_superuser: true
      users:
        - !KeyOf demo-admin-user

  - model: authentik_core.group
    id: grafana-access-group
    state: present
    identifiers:
      name: grafana-access
    attrs:
      users:
        - !KeyOf demo-admin-user
        - !KeyOf demo-regular-user

  - model: authentik_policies_expression.expressionpolicy
    id: grafana-access-policy
    state: present
    identifiers:
      name: grafana-access-group-only
    attrs:
      execution_logging: true
      expression: |
        if request.user.is_anonymous:
            return False
        return ak_is_group_member(request.user, name="grafana-access")

  - model: authentik_providers_oauth2.oauth2provider
    id: grafana-oauth-provider
    state: present
    identifiers:
      name: grafana-oidc-provider
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: !Env OIDC_CLIENT_ID
      client_secret: !Env OIDC_CLIENT_SECRET
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: user_username
      grant_types:
        - authorization_code
        - refresh_token
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: strict
          url: !Env GRAFANA_REDIRECT_URI
          redirect_uri_type: authorization

  - model: authentik_core.application
    id: grafana-application
    state: present
    identifiers:
      slug: grafana
    attrs:
      name: Grafana Demo
      provider: !KeyOf grafana-oauth-provider
      meta_launch_url: !Env GRAFANA_ROOT_URL
      meta_description: OIDC sample application for the authentik assignment lab.
      open_in_new_tab: true
      policy_engine_mode: all

  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !KeyOf grafana-application
      order: 0
    attrs:
      policy: !KeyOf grafana-access-policy
      enabled: true
      failure_result: false
      timeout: 30
